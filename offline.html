<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hors ligne - WTC</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0c0b0a;
        color: #f4efe2;
        font-family: Inter, sans-serif;
        text-align: center;
        padding: 2rem;
      }
      .offline-card {
        max-width: 520px;
        border: 1px solid rgba(232, 199, 102, 0.18);
        padding: 2rem;
        border-radius: 18px;
        background: rgba(12, 11, 10, 0.96);
      }
      .offline-card h1 {
        margin: 0 0 1rem;
        font-family: Anton, sans-serif;
        font-size: 2rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .offline-card p {
        color: #9c9484;
        margin: 1rem 0;
        line-height: 1.7;
      }
      .offline-card a {
        color: #c9a227;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="offline-card">
      <h1>Hors ligne</h1>
      <p>
        La page demandée n’est pas disponible sans connexion. Reviens en ligne
        pour continuer à consulter les séances et envoyer tes inscriptions.
      </p>
      <p><a href="/WTC-App/">Retour à l’accueil</a></p>
    </div>
  </body>
